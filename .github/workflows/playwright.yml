name: Playwright E2E Tests # 流水线的名称

# 触发条件：往 main 或 master 分支 push 代码，或者提 PR 时，自动运行
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60 # 超时时间保护
    runs-on: ubuntu-latest # 在 GitHub 免费提供的云端 Linux 服务器上跑

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # 第一步：拉取你的最新代码

    - name: Setup Node.js
      uses: actions/setup-node@v4 # 第二步：装 Node.js 环境
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci # 第三步：安装项目依赖 (根据 package-lock.json)

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps # 第四步：安装无头浏览器内核和系统依赖

    - name: Run Playwright tests
      run: npx playwright test # 第五步：执行我们写的自动化测试用例！

    - name: Upload Test Report
      uses: actions/upload-artifact@v4 # 第六步：如果跑完（无论成功失败），把测试报告打包存下来
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30 # 报告在云端保留 30 天